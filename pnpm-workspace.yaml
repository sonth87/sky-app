  # nếu tắt cả dock lẫn iconGrid, không còn cách nào mở app qua UI. User đã tự sửa ở repo gốc
  # /Users/skyline/PROJECTS/device-layout, release v0.2.10 "Fix iconGrid default, builtInApps
  # prop & liveWallpapers customization". Trước đó là v0.2.7 (colorScheme prop, Simple Mode
  # config, full-screen exit fix, menu bar customization) — xem git log repo đó để chi tiết.
  # Đã thử nghiệm 2026-07-21: đổi về v0.2.4 KHÔNG sửa được UI vỡ (mất padding/spacing) — xác
  # nhận KHÔNG phải do version device-layout, giữ v0.2.10 (bản đúng ý user).
